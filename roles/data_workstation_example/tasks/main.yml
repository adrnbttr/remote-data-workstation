---
- name: Install the PostgreSQL client
  ansible.builtin.apt:
    name: postgresql-client
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set up the example data project
  become: true
  become_user: "{{ workstation_user }}"
  block:
    - name: Create the project directory
      ansible.builtin.file:
        path: "{{ dwx_project_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy the example docker-compose stack
      ansible.builtin.template:
        src: docker-compose.example.yml.j2
        dest: "{{ dwx_project_dir }}/docker-compose.example.yml"
        mode: "0644"

    - name: Deploy the example environment file
      ansible.builtin.copy:
        src: env.example
        dest: "{{ dwx_project_dir }}/.env.example"
        mode: "0644"
