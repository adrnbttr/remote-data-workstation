---
# The dotfiles repository is managed with GNU Stow.
# `dotfiles_repo` and `dotfiles_dest` are defined in group_vars/all.yml.
dotfiles_version: master
dotfiles_home: "/home/{{ workstation_user }}"
dotfiles_stow_packages:
  - zsh
  - config
  - oh-my-zsh-custom
  - bin

# oh-my-zsh and the extra zsh plugins referenced by the stowed .zshrc.
dotfiles_install_oh_my_zsh: true
dotfiles_oh_my_zsh_dir: "{{ dotfiles_home }}/.oh-my-zsh"
dotfiles_zsh_plugins_dir: "{{ dotfiles_home }}/.local/share/zsh/plugins"
dotfiles_zsh_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions
  - name: fast-syntax-highlighting
    repo: https://github.com/zdharma-continuum/fast-syntax-highlighting
  - name: fzf-tab
    repo: https://github.com/Aloxaf/fzf-tab

# Make zsh the login shell once the dotfiles are in place.
dotfiles_set_default_shell: true
dotfiles_zsh_path: /usr/bin/zsh
