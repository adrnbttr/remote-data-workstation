---
- name: Install dotfiles prerequisites
  ansible.builtin.apt:
    name:
      - git
      - stow
      - zsh
    state: present
    update_cache: true

- name: Set up dotfiles for the workstation user
  become: true
  become_user: "{{ workstation_user }}"
  block:
    - name: Clone the dotfiles repository
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dest }}"
        version: "{{ dotfiles_version }}"
        update: true

    - name: Install oh-my-zsh
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh
        dest: "{{ dotfiles_oh_my_zsh_dir }}"
        version: master
        depth: 1
        update: false
      when: dotfiles_install_oh_my_zsh | bool

    - name: Install the zsh plugins
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ dotfiles_zsh_plugins_dir }}/{{ item.name }}"
        version: "{{ item.version | default('master') }}"
        depth: 1
        update: false
      loop: "{{ dotfiles_zsh_plugins }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Stow the dotfiles packages
      ansible.builtin.command:
        cmd: "stow -v -d {{ dotfiles_dest }} -t {{ dotfiles_home }} -R {{ item }}"
      loop: "{{ dotfiles_stow_packages }}"
      register: dotfiles_stow
      changed_when: "'LINK' in dotfiles_stow.stderr or 'UNLINK' in dotfiles_stow.stderr"
      loop_control:
        label: "{{ item }}"

- name: Set zsh as the default shell
  ansible.builtin.user:
    name: "{{ workstation_user }}"
    shell: "{{ dotfiles_zsh_path }}"
  when: dotfiles_set_default_shell | bool
