---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set default firewall policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow configured TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ hardening_ufw_allowed_tcp_ports }}"

- name: Allow all traffic on the Tailscale interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: "{{ hardening_ufw_tailscale_interface }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
