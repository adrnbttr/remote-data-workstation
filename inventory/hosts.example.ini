# Copy this file to inventory/hosts.ini and fill in your own host.
#
# The workstation is reached over its Tailscale address (100.x.y.z): there is
# no public SSH exposure. See the hardening role for details.

[workstation]
my-workstation ansible_host=100.64.0.1

[workstation:vars]
ansible_user=adrien
ansible_python_interpreter=/usr/bin/python3
