---
# Example profile — the base workstation plus a generic, anonymized
# data-workstation overlay (PostgreSQL client, an example data project, a sample
# docker-compose). It demonstrates how a project layer is added on top of the
# socle.
- name: Import base workstation
  ansible.builtin.import_playbook: site.yml

- name: Apply the example data overlay
  hosts: workstation
  become: true

  roles:
    - data_workstation_example
